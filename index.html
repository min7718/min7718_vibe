    <style>

<body class="bg-slate-50 font-sans text-slate-800 antialiased">

                card.id = `q-${index}`;
                card.className = "bg-white p-8 rounded-3xl shadow-md border border-slate-100 space-y-6 transition-all duration-300";
                
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-xs">Question ${index + 1}/32</span>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800 leading-snug">${q.q}</h2>
                    <div class="grid gap-3">
                        <button onclick="selectOption(${index}, 'A', '${q.type}')" id="btn-${index}-A" class="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 transition-all font-medium text-slate-700 text-sm cursor-pointer">
                            ${q.a}
                        </button>
                        <button onclick="selectOption(${index}, 'B', '${q.type}')" id="btn-${index}-B" class="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 transition-all font-medium text-slate-700 text-sm cursor-pointer">
                            ${q.b}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 사용자가 보관할 선택 내역 기록
        let userAnswers = new Array(32).fill(null);

        // 옵션 선택 시 처리 함수
        function selectOption(qIdx, option, type) {
            // 이전에 선택한 버튼 스타일 초기화
            document.getElementById(`btn-${qIdx}-A`).classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
            document.getElementById(`btn-${qIdx}-B`).classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');

            // 현재 선택한 버튼 하이라이트
            document.getElementById(`btn-${qIdx}-${option}`).classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');

            // 답안 기록
            userAnswers[qIdx] = { option, type };

            // 모든 문항이 체크되었는지 확인
            if (userAnswers.filter(ans => ans !== null).length === 32) {
                showResult();
            } else {
                // 다음 문항 카드로 부드럽게 스크롤 이동
                const nextCard = document.getElementById(`q-${qIdx + 1}`);
                if (nextCard) {
                    nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // 결과 산출 및 화면 전환
        function showResult() {
            // 점수 초기화 후 계산
            scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
            userAnswers.forEach(ans => {
                if (ans.option === 'A') scores[ans.type]++;
            });

            // MBTI 문자열 조합 (A 조합이 많으면 앞 글자, 반대면 뒷 글자)
            // 각 성향별 8문항 중 4문항 이상이면 A성향 선택으로 간주
            const mbti = [
                scores.EI >= 4 ? 'E' : 'I',
                scores.SN >= 4 ? 'S' : 'N',
                scores.TF >= 4 ? 'T' : 'F',
                scores.JP >= 4 ? 'J' : 'P'
            ].join('');

            // 화면 전환
            document.getElementById('quiz-container').classList.add('hidden');
            const resultPage = document.getElementById('result-page');
            resultPage.classList.remove('hidden');
            resultPage.scrollIntoView({ behavior: 'smooth' });

            // 데이터 바인딩
            const data = mbtiResults[mbti];
            document.getElementById('result-emoji').innerText = data.emoji;
            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('result-title').innerText = data.title;
            document.getElementById('result-desc').innerText = data.desc;
        }
    </script>
</body>
</html>
